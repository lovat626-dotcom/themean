                document.getElementById('nav-title').innerHTML = `<span class="text-[#8EA683]">🌿</span> 盤點系統`;
                renderVendorSelection();
                window.scrollTo({ top: 0 });
            }

            function showInventory(viewName) {
                currentVendor = viewName;
                document.getElementById('view-vendors').classList.add('hidden');
                document.getElementById('view-inventory').classList.remove('hidden');
                document.getElementById('bottom-bar').classList.remove('hidden');
                document.getElementById('btn-back').classList.remove('hidden');
                
                let icon = viewName === '待辦叫貨' ? '<span class="text-[#C28F70]">📌</span>' : '<span class="text-[#8EA683]">🌿</span>';
                document.getElementById('nav-title').innerHTML = `${icon} <span class="truncate max-w-[120px] block">${viewName}</span>`;
                
                // 顯示或隱藏清空叫貨按鈕
                if (viewName !== '全部廠商' && viewName !== '待辦叫貨') {
                    document.getElementById('btn-clear-vendor').classList.remove('hidden');
                } else {
                    document.getElementById('btn-clear-vendor').classList.add('hidden');
                }

                renderInventory(viewName);
                updateTotals();
                window.scrollTo({ top: 0 });
            }

            function clearVendorTodo(vName) {
                if(!confirm(`確定要清空 ${vName} 的所有待辦標記嗎？`)) return;
                
                vendors[vName].forEach((item, idx) => {
                    const id = `${vName}-${idx}`;
                    globalState[id].nextTime = false;
                });
                
                const currentState = JSON.parse(localStorage.getItem('inventoryNextTime_v15') || '{}');
                vendors[vName].forEach((item, idx) => {
                    delete currentState[`${vName}-${idx}`];
                });
                localStorage.setItem('inventoryNextTime_v15', JSON.stringify(currentState));
                
                renderInventory(currentVendor);
                updateTotals();
            }

            function clearVendorQty() {
                if (!currentVendor || currentVendor === '全部廠商' || currentVendor === '待辦叫貨') return;
                if (!confirm(`確定要清空 ${currentVendor} 本次所有的叫貨數量嗎？`)) return;
                
                vendors[currentVendor].forEach((item, idx) => {
                    const id = `${currentVendor}-${idx}`;
                    globalState[id].qty = 0;
                    const input = document.getElementById(`qty-${id}`);
                    if(input) input.value = '';
                });
                updateTotals();
            }

            function renderInventory(viewName) {
                const container = document.getElementById('inventory-container');
                container.innerHTML = '';

                let targetVendors = (viewName === '全部廠商' || viewName === '待辦叫貨') 
                    ? Object.keys(vendors) : [viewName];

                let hasAnyItems = false;

                targetVendors.forEach(vName => {
                    const vendorItems = vendors[vName];
                    let rowsHtml = '';
                    
                    vendorItems.forEach((item, idx) => {
                        const id = `${vName}-${idx}`;
                        const state = globalState[id];
                        
                        if (viewName === '待辦叫貨' && !state.nextTime) return;
                        
                        let infoText = [];
                        if (item['備註']) infoText.push(item['備註']);
                        if (state.moq > 1) infoText.push(`起訂 ${state.moq}`);
                        let infoStr = infoText.join(' · ');

                        rowsHtml += `
                            <div class="flex items-center px-4 py-4 border-b border-[#EAEAEA] bg-white hover:bg-[#F9F8F6] transition">
                                
                                <div class="flex-1 pr-3 min-w-0">
                                    <div class="font-bold text-[#4A4A4A] text-sm leading-snug break-words">
                                        ${item['品項']}
                                    </div>
                                    <div class="text-[0.7rem] text-[#8A8A8C] mt-1 tracking-wide">
                                        ${item['單位']}
                                    </div>
                                    <div class="text-[0.65rem] text-[#8A8A8C] mt-0.5 break-words">
                                        ${infoStr}
                                    </div>
                                </div>
                                
                                <div class="w-12 text-center font-bold text-[#4A4A4A] text-xs shrink-0">
                                    ${state.price > 0 ? '$' + state.price : '-'}
                                </div>
                                
                                <div class="w-[6.5rem] flex justify-center shrink-0">
                                    <div class="flex items-center bg-[#F9F8F6] rounded-full h-8 w-full">
                                        <button onclick="changeQty('${id}', -1)" class="w-8 h-full text-[#8A8A8C] font-bold text-lg flex items-center justify-center rounded-l-full active:bg-[#EAEAEA] transition">−</button>
                                        <input type="number" id="qty-${id}" value="${state.qty || ''}" 
                                            class="w-full bg-transparent text-center font-bold text-[#4A4A4A] outline-none p-0 text-sm" 
                                            oninput="updateState('${id}')" onfocus="this.select()">
                                        <button onclick="changeQty('${id}', 1)" class="w-8 h-full text-[#8EA683] font-bold text-lg flex items-center justify-center rounded-r-full active:bg-[#EAEAEA] transition">+</button>
                                    </div>
                                </div>
                                
                                <div class="w-10 flex justify-end shrink-0 pl-1">
                                    <label class="flex items-center cursor-pointer">
                                        <div class="relative">
                                            <input type="checkbox" id="next-${id}" class="sr-only toggle-checkbox" ${state.nextTime ? 'checked' : ''} onchange="updateState('${id}')">
                                            <div class="block w-7 h-4 rounded-full toggle-label"></div>
                                            <div class="dot absolute left-[2px] top-[2px] bg-white w-3 h-3 rounded-full transition transform ${state.nextTime ? 'translate-x-3' : ''} shadow-sm"></div>
                                        </div>
                                    </label>
                                </div>
                                
                            </div>
                        `;
                    });

                    if (rowsHtml !== '') {
                        hasAnyItems = true;
                        const section = document.createElement('div');
                        
                        let clearBtnHtml = viewName === '待辦叫貨' ? 
                            `<button onclick="clearVendorTodo('${vName}')" class="text-[0.65rem] bg-[#FFFFFF] border border-[#EAEAEA] text-[#C28F70] px-2 py-1 rounded-full shadow-sm active:bg-[#F9F8F6]">一鍵清空待辦</button>` : '';

                        section.innerHTML = `
                            <div class="sticky-vendor bg-[#F5F5F3]/95 backdrop-blur px-4 flex items-center justify-between border-b border-[#EAEAEA]">
                                <div class="flex items-center gap-2">
                                    <h3 class="font-bold text-[15px] text-[#4A4A4A] truncate max-w-[150px]">${vName}</h3>
                                </div>
                                <div class="flex items-center gap-2">
                                    ${clearBtnHtml}
                                    <span class="text-[0.65rem] font-bold text-[#8A8A8C] tracking-widest">${vendorItems.length} 個品項</span>
                                </div>
                            </div>
                            
                            <div class="sticky-header bg-[#FFFFFF]/95 backdrop-blur px-4 py-2 flex items-center text-[0.65rem] font-bold text-[#8A8A8C] tracking-widest border-b border-[#EAEAEA]">
                                <div class="flex-1">品項資訊</div>
                                <div class="w-12 text-center shrink-0">單價</div>
                                <div class="w-[6.5rem] text-center shrink-0">數量</div>
                                <div class="w-10 text-right shrink-0">下次</div>
                            </div>
                            
                            <div class="bg-white pb-2">
                                ${rowsHtml}
                            </div>
                        `;
                        container.appendChild(section);
                    }
                });

                if (!hasAnyItems && viewName === '待辦叫貨') {
                    container.innerHTML = `<div class="p-16 text-center text-[#8A8A8C] font-bold text-sm tracking-widest">目前沒有待辦叫貨 🌿</div>`;
                }
            }

            function changeQty(id, delta) {
                const input = document.getElementById(`qty-${id}`);
                let val = parseInt(input.value) || 0;
                const moq = globalState[id].moq || 1;

                if (delta > 0) {
                    if (val === 0) val = moq; 
                    else val += delta;      
                } else if (delta < 0) {
                    if (val <= moq) val = 0;  
                    else val += delta;      
                }

                input.value = val === 0 ? '' : val;
                updateState(id);
            }

            function updateState(id) {
                const input = document.getElementById(`qty-${id}`);
                let qtyVal = parseFloat(input.value) || 0;
                const moq = globalState[id].moq || 1;
                
                if (qtyVal > 0 && qtyVal < moq) {
                    qtyVal = moq;
                    input.value = moq;
                }

                const nextVal = document.getElementById(`next-${id}`).checked;
                
                const dot = document.getElementById(`next-${id}`).parentElement.querySelector('.dot');
                if(nextVal) dot.classList.add('translate-x-3');
                else dot.classList.remove('translate-x-3');

                globalState[id].qty = qtyVal;
                globalState[id].nextTime = nextVal;
                
                const currentState = JSON.parse(localStorage.getItem('inventoryNextTime_v15') || '{}');
                if (nextVal) currentState[id] = true;
                else delete currentState[id];
                localStorage.setItem('inventoryNextTime_v15', JSON.stringify(currentState));

                updateTotals();
            }

            function updateTotals() {
                let total = 0;
                let targetVendors = (currentVendor === '全部廠商' || currentVendor === '待辦叫貨') 
                    ? Object.keys(vendors) : [currentVendor];
                
                targetVendors.forEach(vName => {
                    vendors[vName].forEach((item, idx) => {
                        const id = `${vName}-${idx}`;
                        if (currentVendor === '待辦叫貨' && !globalState[id].nextTime) return;
                        total += globalState[id].qty * globalState[id].price;
                    });
                });
                document.getElementById('grand-total').innerText = `$${total}`;
            }

            function generateOrder() {
                let orderLines = [];
                let currentVendorTotal = 0;

                let targetVendors = (currentVendor === '全部廠商' || currentVendor === '待辦叫貨') 
                    ? Object.keys(vendors) : [currentVendor];

                targetVendors.forEach(vName => {
                    vendors[vName].forEach((item, idx) => {
                        const id = `${vName}-${idx}`;
                        const state = globalState[id];
                        
                        if (state.qty > 0) {
                            orderLines.push(`${item['品項']}: ${state.qty} ${item['單位']}`);
                            currentVendorTotal += state.qty * state.price;
                        }
                    });
                });

                if (orderLines.length === 0) return alert("尚未輸入叫貨數量");
                
                // Threshold Check Logic
                if (currentVendor && currentVendor !== '全部廠商' && currentVendor !== '待辦叫貨') {
                    const threshold = vendorThresholds[currentVendor];
                    if (threshold && currentVendorTotal < threshold) {
                        const confirmMsg = `提醒：${currentVendor} 叫貨金額目前為 $${currentVendorTotal}，未達出貨門檻 $${threshold}。\n廠商可能無法出貨，確定要產生叫貨單嗎？`;
                        if(!confirm(confirmMsg)) return;
                    }
                }

                let finalMsg = "您好，想訂購以下品項：\n\n" + orderLines.join('\n') + "\n\n再麻煩安排配送，謝謝！";
                document.getElementById('orderTextarea').value = finalMsg;
                document.getElementById('orderModal').classList.remove('hidden');
            }

            function closeModal() { document.getElementById('orderModal').classList.add('hidden'); }
            function copyOrder() {
                const textarea = document.getElementById('orderTextarea');
                textarea.select();
                document.execCommand('copy');
                alert('已複製！');
            }

            window.onload = () => showVendorSelection();
        </script>
    </body>
    </html>
